version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: forktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-Shell", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/forktracker
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A app.workers.task_schedule worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/forktracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis

  beat:
    build: ./backend
    command: celery -A app.workers.task_schedule beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/forktracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis

volumes:
  postgres_data:
  redis_data: